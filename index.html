<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบอาสาสมัคร - วัดหมอนไม้</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-6 text-center border-t-8 border-blue-800">
        <!-- โลโก้สมาคม -->
        <div class="mb-6">
            <div class="mx-auto w-24 h-24 bg-blue-50 flex items-center justify-center rounded-full border-2 border-blue-100">
                <span class="text-blue-800 font-bold text-lg">กู้ภัย</span>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-gray-800">สมาคมกู้ภัยวัดหมอนไม้</h1>
        <p class="text-gray-500 text-sm mt-1">ระบบตรวจสอบรายชื่ออาสาสมัคร</p>

        <div class="mt-8 space-y-4">
            <input type="text" id="searchInput" placeholder="กรอกชื่อ-นามสกุล หรือรหัส..." 
                   class="w-full px-4 py-4 border-2 border-gray-200 rounded-2xl focus:border-blue-600 focus:outline-none transition">
            
            <button onclick="searchVolunteer()" class="w-full bg-blue-800 hover:bg-blue-900 text-white font-bold py-4 rounded-2xl transition shadow-lg">
                ตรวจสอบข้อมูล
            </button>
        </div>

        <div class="mt-6 text-xs text-gray-400">
            COPYRIGHT © 2026 RESCUE WAT MON MAI
        </div>
    </div>

    <script>
        // เปลี่ยน ID นี้ให้เป็น ID ของ Google Sheets พี่ครับ
        const SPREADSHEET_ID = '1G7WzDKyBF_sz6IY3ers8F8udD4iJp2t4YBvs0VmgN1E'; 
        const URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

        let volunteerData = [];

        async function fetchData() {
            try {
                const response = await fetch(URL);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                volunteerData = json.table.rows.map(row => ({
                    keyword: row.c[0]?.v || '',
                    name: row.c[1]?.v || ''
                }));
            } catch (e) {
                console.error("โหลดข้อมูลไม่ได้");
            }
        }
        
        function searchVolunteer() {
            const input = document.getElementById('searchInput').value.trim();
            if (input) {
                alert("ระบบกำลังเชื่อมต่อฐานข้อมูล... (โปรดตรวจสอบว่า Google Sheets ตั้งค่าเป็น Public แล้ว)");
            }
        }

        fetchData();
    </script>
</body>
</html>
